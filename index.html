<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carteira Barsi — Dividendos</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0a0e1a;
  --card:#1a2235;
  --border:#2a3a55;
  --gold:#d4a843;
  --green:#22c55e;
  --red:#ef4444;
  --text:#e8eaf0;
  --muted:#7a8ba8;
  --accent:#3b82f6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  padding:40px 20px;
}

.wrapper{
  max-width:1400px;
  margin:auto;
}

header{
  text-align:center;
  margin-bottom:40px;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:3rem;
  margin-bottom:10px;
}

h1 span{
  color:var(--gold);
}

.subtitle{
  color:var(--muted);
}

.infobar{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin:30px 0;
}

.pill{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:999px;
  padding:10px 16px;
  font-size:12px;
}

.segment{
  margin-bottom:40px;
}

.seg-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.seg-icon{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  font-size:20px;
}

.seg-title{
  font-size:1.3rem;
  font-weight:bold;
}

.seg-desc{
  color:var(--muted);
  font-size:13px;
}

.table-wrap{
  overflow:auto;
  border:1px solid var(--border);
  border-radius:16px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1100px;
}

thead{
  background:rgba(212,168,67,0.08);
}

th{
  padding:14px;
  text-align:left;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--gold);
}

th:not(:first-child),
td:not(:first-child){
  text-align:right;
}

td{
  padding:16px 14px;
  border-top:1px solid rgba(42,58,85,0.5);
}

tbody tr:hover{
  background:rgba(59,130,246,0.05);
}

.ticker{
  display:inline-block;
  background:rgba(212,168,67,0.12);
  border:1px solid rgba(212,168,67,0.3);
  padding:4px 10px;
  border-radius:6px;
  color:var(--gold);
  font-family:'DM Mono',monospace;
}

.company{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.price{
  font-family:'DM Mono',monospace;
}

.pos{
  color:var(--green);
}

.neg{
  color:var(--red);
}

.loading{
  color:var(--muted);
  font-size:12px;
}

a{
  color:var(--accent);
  text-decoration:none;
}

.footer{
  margin-top:50px;
  padding-top:30px;
  border-top:1px solid var(--border);
  text-align:center;
  color:var(--muted);
  font-size:12px;
  line-height:1.7;
}

</style>
</head>

<body>

<div class="wrapper">

<header>
  <h1>Carteira <span>Barsi</span></h1>

  <p class="subtitle">
    Dashboard automático de dividendos e ações da B3
  </p>
</header>

<div class="infobar">
  <div class="pill">📈 Atualização automática</div>
  <div class="pill">⏱ Atualiza a cada 60 segundos</div>
  <div class="pill">
    Última atualização:
    <span id="last-update">--</span>
  </div>
</div>

<div id="segments"></div>

<div class="footer">
  ⚠️ Conteúdo apenas educacional.<br>
  Dados via Yahoo Finance.
</div>

</div>

<script>

const SEGMENTS = [

{
  icon:'🏦',
  color:'#3b82f6',
  title:'Bancos',
  desc:'Instituições financeiras',
  ativos:[
    { ticker:'BBAS3', name:'Banco do Brasil' },
    { ticker:'ITUB4', name:'Itaú Unibanco' }
  ]
},

{
  icon:'⚡',
  color:'#f59e0b',
  title:'Energia',
  desc:'Energia elétrica',
  ativos:[
    { ticker:'TAEE11', name:'Taesa' },
    { ticker:'EGIE3', name:'Engie Brasil' }
  ]
},

{
  icon:'💧',
  color:'#06b6d4',
  title:'Saneamento',
  desc:'Empresas de saneamento',
  ativos:[
    { ticker:'SAPR11', name:'Sanepar' },
    { ticker:'CSMG3', name:'Copasa' }
  ]
}

];

function yahooTicker(t){
  return t + '.SA';
}

function historyUrl(t){
  return `https://finance.yahoo.com/quote/${yahooTicker(t)}`;
}

function build(){

  const container =
    document.getElementById('segments');

  SEGMENTS.forEach((seg,si)=>{

    const div =
      document.createElement('div');

    div.className='segment';

    div.innerHTML=`

      <div class="seg-header">

        <div class="seg-icon"
             style="background:${seg.color}22;border:1px solid ${seg.color}55">
          ${seg.icon}
        </div>

        <div>
          <div class="seg-title">${seg.title}</div>
          <div class="seg-desc">${seg.desc}</div>
        </div>

      </div>

      <div class="table-wrap">

      <table>

      <thead>
      <tr>
        <th>Ativo</th>
        <th>Cotação</th>
        <th>Var%</th>
        <th>Média 52s</th>
        <th>DY</th>
        <th>Div. Anual</th>
        <th>Histórico</th>
      </tr>
      </thead>

      <tbody>

      ${seg.ativos.map((a,ai)=>`

        <tr>

        <td>
          <div class="ticker">${a.ticker}</div>
          <div class="company">${a.name}</div>
        </td>

        <td id="price-${si}-${ai}">
          <span class="loading">carregando...</span>
        </td>

        <td id="change-${si}-${ai}">--</td>

        <td id="avg-${si}-${ai}">--</td>

        <td id="dy-${si}-${ai}">--</td>

        <td id="div-${si}-${ai}">--</td>

        <td>
          <a href="${historyUrl(a.ticker)}"
             target="_blank">
             Ver ↗
          </a>
        </td>

        </tr>

      `).join('')}

      </tbody>

      </table>

      </div>

    `;

    container.appendChild(div);

  });

}

async function fetchQuote(ticker){

  const url =
    `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${yahooTicker(ticker)}?modules=price,summaryDetail`;

  const response =
    await fetch(url);

  if(!response.ok){
    throw new Error('Erro HTTP');
  }

  const data =
    await response.json();

  const result =
    data.quoteSummary.result[0];

  const priceData =
    result.price;

  const summary =
    result.summaryDetail;

  const price =
    priceData.regularMarketPrice.raw;

  const prev =
    priceData.regularMarketPreviousClose.raw;

  const change =
    ((price-prev)/prev)*100;

  return {

    price,

    change,

    avg52:
      summary.fiftyTwoWeekAverage?.raw || 0,

    dy:
      (summary.dividendYield?.raw || 0)*100,

    annualDiv:
      summary.trailingAnnualDividendRate?.raw || 0

  };

}

async function updateAll(){

  const tasks=[];

  SEGMENTS.forEach((seg,si)=>{

    seg.ativos.forEach((a,ai)=>{

      tasks.push(

        fetchQuote(a.ticker)

        .then(q=>{

          const priceEl =
            document.getElementById(`price-${si}-${ai}`);

          const changeEl =
            document.getElementById(`change-${si}-${ai}`);

          const avgEl =
            document.getElementById(`avg-${si}-${ai}`);

          const dyEl =
            document.getElementById(`dy-${si}-${ai}`);

          const divEl =
            document.getElementById(`div-${si}-${ai}`);

          priceEl.innerHTML =
            `<span class="price">
              R$ ${q.price.toFixed(2).replace('.',',')}
            </span>`;

          changeEl.textContent =
            q.change.toFixed(2)+'%';

          changeEl.className =
            q.change >= 0 ? 'pos' : 'neg';

          avgEl.textContent =
            'R$ '+
            q.avg52.toFixed(2).replace('.',',');

          dyEl.textContent =
            q.dy.toFixed(2)+'%';

          divEl.textContent =
            'R$ '+
            q.annualDiv.toFixed(2).replace('.',',');

        })

        .catch(()=>{

          document.getElementById(`price-${si}-${ai}`)
            .innerHTML =
              `<a href="${historyUrl(a.ticker)}"
                  target="_blank">
                  Yahoo ↗
               </a>`;

        })

      );

    });

  });

  await Promise.allSettled(tasks);

  document.getElementById('last-update')
    .textContent =
      new Date().toLocaleTimeString('pt-BR');

}

build();

updateAll();

setInterval(updateAll,60000);

</script>

</body>
</html>
